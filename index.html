<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <title>Dance Studio</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      /* ЗАЛІЗОБЕТОННА ЗАБОРОНА СТОРІНЦІ "ЇЗДИТИ" */
      html, body { 
        background: #F8F9FD; 
        color: #1F1F1F; 
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden !important; 
        position: relative;
      }
      
      #root {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden !important;
      }

      /* МОБІЛЬНІ НАЛАШТУВАННЯ */
      @media (max-width: 768px) {
        
        body {
          zoom: 0.70; /* Зменшений масштаб */
        }

        header {
          padding-top: max(40px, env(safe-area-inset-top)) !important;
          flex-direction: column !important;
          align-items: flex-start !important;
          gap: 12px !important;
        }
        
        input, select, textarea {
          min-width: 0 !important;
          max-width: 100% !important;
          width: 100% !important;
          font-size: 16px !important; 
        }

        main > div > div[style*="display: flex"] {
          flex-direction: column !important;
          align-items: stretch !important;
        }

        /* 🟢 ФІКС КОЛОНКИ З ІМЕНАМИ */
        th:first-child, td:first-child {
          min-width: 160px !important; /* Розширили колонку */
          max-width: 160px !important;
          padding: 10px 12px !important;
          font-size: 13px !important;
          white-space: normal !important; /* Дозволяємо перенос тексту */
          word-wrap: break-word !important; /* Акуратний розрив, якщо ім'я задовге */
        }

        /* Внутрішній блок теж має вміти переноситися */
        td:first-child > div {
          white-space: normal !important;
          flex-wrap: wrap !important;
        }

        nav button {
          padding: 10px 16px !important;
          font-size: 13px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
